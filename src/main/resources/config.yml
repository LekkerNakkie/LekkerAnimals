# --------------------------------------------------------------------
# LekkerAnimal main configuration
# --------------------------------------------------------------------

debug: false

language-file: "lang_NL.yml"

# --------------------------------------------------------------------
# Database
# --------------------------------------------------------------------

database:
  type: "SQLITE" # SQLITE or MYSQL

  sqlite:
    file: "data.db"

  mysql:
    host: "localhost"
    port: 3306
    database: "lekkeranimal"
    username: "root"
    password: ""
    ssl: false
    pool-size: 10

# --------------------------------------------------------------------
# Main
# --------------------------------------------------------------------

main:
  autosave-interval-seconds: 300
  save-on-disable: true

# --------------------------------------------------------------------
# Modules
# --------------------------------------------------------------------

modules:
  online-owner-activity:
    enabled: true

  co-owners:
    enabled: true
    max-per-animal: 3
    allow-feed: true
    allow-harvest: true
    allow-gui-access: true
    allow-direct-upgrades: false

  co-owner-gui:
    enabled: true
    use-chat-input: true

# --------------------------------------------------------------------
# Hunger
# --------------------------------------------------------------------

hunger:
  enabled: true
  task-interval-seconds: 60
  warning-threshold-percent: 25
  kill-on-zero: true

# --------------------------------------------------------------------
# Leveling
# --------------------------------------------------------------------

leveling:
  enabled: true
  max-level: 50
  base-xp: 100
  xp-scale: 1.15

# --------------------------------------------------------------------
# Bond
# --------------------------------------------------------------------

bond:
  enabled: true
  max-bond: 100
  start-bond: 10
  start-level: 1

# --------------------------------------------------------------------
# Custom Heads
# --------------------------------------------------------------------

custom-heads:
  enabled: true

  # If true, custom LekkerAnimal heads keep their rarity and meta
  # after being placed and broken again.
  preserve-placed-heads: true

  # Head display name format
  default-name-format: "{rarity} {animal} Head"

  # Optional lore
  lore:
    - "&7Rarity: {rarity}"

  # Rarity display texts
  rarities:
    COMMON: "&fCommon"
    UNCOMMON: "&aUncommon"
    RARE: "&dRare"
    ULTRA: "&eUltra"
    LEGENDARY: "&6Legendary"

# --------------------------------------------------------------------
# Sounds
# --------------------------------------------------------------------

sounds:
  feed: "ENTITY_PLAYER_LEVELUP"
  levelup: "ENTITY_EXPERIENCE_ORB_PICKUP"
  death: "ENTITY_GENERIC_EXTINGUISH_FIRE"