enabled: true

item:
  material: "CAULDRON"
  name: "&b{tier_display} &7Voederbak"
  lore:
    - "&7Owner: &f{owner}"
    - "&7Dieren: &f{max_animals}"
    - "&7Radius: &f{radius} blocks"
    - "&7Voedsel slots: &f{storage_slots}"
    - "&7Voedsel in bak: &f{food_amount}"
    - "&7Hologram: {hologram_status}"
    - ""
    - "&ePlaats dit item om een voederbak te maken."

hologram:
  enabled: true
  offset-y: 1.4
  refresh-ticks: 20
  visible-radius-blocks: 4.0
  lines:
    - "&b{tier_display} &7Voederbak"
    - "&7Owner: &f{owner}"
    - "&7Dieren: &f{nearby_animals}&7/&f{max_animals}"
    - "&7Voedsel: &f{food_amount}"

gui:
  title: "&bVoederbak &8• &f{tier_display}"
  rows: 3

  filler:
    enabled: false
    material: "LIGHT_BLUE_STAINED_GLASS_PANE"
    name: " "

  slots:
    info: 10
    open-storage: 12
    show-radius: 14
    toggle-hologram: 16
    upgrade: 22

  info-item:
    material: "CAULDRON"
    name: "&bFeedstation Info"
    lore:
      - "&7Owner: &f{owner}"
      - "&7Tier: {tier_display}"
      - "&7Radius: &f{radius}"
      - "&7Eat distance: &f{eat_distance}"
      - "&7Max animals: &f{max_animals}"
      - "&7Nearby animals: &f{nearby_animals}"
      - "&7Stored food: &f{food_amount}"
      - "&7Voedsel slots: &f{storage_slots}"
      - "&7Hologram: {hologram_status}"
      - "&7Hologram zichtafstand: &f{hologram_visible_radius_blocks} blocks"
      - "&7Walk repath: &f{walking_ai_repath_interval} ticks"
      - "&7Walk hunger trigger: &f{walking_ai_hunger_threshold_percent}%"

  storage-button:
    material: "CHEST"
    name: "&bOpen inhoud"
    lore:
      - "&7Klik om de inhoud"
      - "&7van deze voederbak te openen."
      - "&7Slots: &f{storage_slots}"
      - "&7Voedsel: &f{food_amount}"

  radius-button:
    material: "BLAZE_POWDER"
    name: "&bToon radius"
    lore:
      - "&7Klik om tijdelijk"
      - "&7de radius te tonen."
      - "&7Radius: &f{radius}"

  hologram-button:
    enabled-material: "LIME_DYE"
    disabled-material: "GRAY_DYE"
    name: "&bHologram"
    enabled-lore:
      - "&7Status: &aAAN"
      - "&eKlik om uit te zetten."
    disabled-lore:
      - "&7Status: &cUIT"
      - "&eKlik om aan te zetten."

  upgrade-item:
    enabled-name: "&aUpgrade feedstation"
    enabled-lore:
      - "&7Volgend tier: {next_tier_display}"
      - "&7Benodigd: &f{upgrade_amount}x {upgrade_item}"
      - ""
      - "&eKlik om te upgraden."
    disabled-name: "&cGeen upgrade beschikbaar"
    disabled-lore:
      - "&7Deze voederbak zit al"
      - "&7op het hoogste tier."

storage-gui:
  title: "&bFeedstation Inhoud &8• &f{tier_display}"

  blocked-slot-item:
    material: "RED_STAINED_GLASS_PANE"
    name: "&cBlocked slot"
    lore:
      - "&7Deze slot is niet beschikbaar"
      - "&7voor dit tier."

radius-preview:
  duration-ticks: 100
  particle: "END_ROD"
  count-per-point: 1
  points: 80
  y-offset: 0.15

task:
  tick-interval: 20

feeding:
  only-when-hungry: true
  consume-one-item-per-feed: true
  skip-full-animals: true
  prioritize-lowest-hunger: true

walking-ai:
  enabled: true
  repath-interval-ticks: 60
  hunger-threshold-percent: 85.0
  random-target-radius: 1.2
  min-distance-to-start: 2.0

tiers:
  COMMON:
    display: "&fCommon"
    max-animals: 2
    radius: 8
    storage-slots: 2
    attraction-range: 12
    attraction-speed: 0.22
    feed-interval-seconds: 20
    eat-distance: 2.2

  UNCOMMON:
    display: "&aUncommon"
    max-animals: 5
    radius: 10
    storage-slots: 5
    attraction-range: 14
    attraction-speed: 0.24
    feed-interval-seconds: 18
    eat-distance: 2.2

  RARE:
    display: "&dRare"
    max-animals: 7
    radius: 12
    storage-slots: 7
    attraction-range: 16
    attraction-speed: 0.26
    feed-interval-seconds: 16
    eat-distance: 2.4

  ULTRA:
    display: "&5Ultra"
    max-animals: 10
    radius: 14
    storage-slots: 10
    attraction-range: 18
    attraction-speed: 0.28
    feed-interval-seconds: 14
    eat-distance: 2.5

  LEGENDARY:
    display: "&6Legendary"
    max-animals: 15
    radius: 16
    storage-slots: 15
    attraction-range: 20
    attraction-speed: 0.30
    feed-interval-seconds: 12
    eat-distance: 2.5

upgrades:
  enabled: true

  chain:
    COMMON: "UNCOMMON"
    UNCOMMON: "RARE"
    RARE: "ULTRA"
    ULTRA: "LEGENDARY"

  costs:
    UNCOMMON:
      material: "IRON_INGOT"
      amount: 8
    RARE:
      material: "GOLD_INGOT"
      amount: 8
    ULTRA:
      material: "DIAMOND"
      amount: 6
    LEGENDARY:
      material: "NETHERITE_INGOT"
      amount: 2

particles:
  idle:
    enabled: true
    particle: "HAPPY_VILLAGER"
    count: 2
    spread-x: 0.2
    spread-y: 0.1
    spread-z: 0.2
    extra: 0.0

  feeding:
    enabled: true
    particle: "HEART"
    count: 2
    spread-x: 0.2
    spread-y: 0.2
    spread-z: 0.2
    extra: 0.0

  attraction:
    enabled: true
    particle: "END_ROD"
    count: 2
    spread-x: 0.2
    spread-y: 0.2
    spread-z: 0.2
    extra: 0.0

sounds:
  enabled: true
  open: "BLOCK_CHEST_OPEN"
  deposit: "ENTITY_ITEM_PICKUP"
  feed: "ENTITY_GENERIC_EAT"
  upgrade: "ENTITY_PLAYER_LEVELUP"