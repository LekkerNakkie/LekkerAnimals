debug: false

language-file: "lang_NL.yml"

database:
  type: "SQLITE" # SQLITE or MYSQL

  sqlite:
    file: "data.db"

  mysql:
    host: "localhost"
    port: 3306
    database: "lekkeranimal"
    username: "root"
    password: ""
    ssl: false
    pool-size: 10

main:
  autosave-interval-seconds: 300
  save-on-disable: true

modules:
  online-owner-activity:
    enabled: true

  co-owners:
    enabled: true
    max-per-animal: 3
    allow-feed: true
    allow-harvest: true
    allow-gui-access: true
    allow-direct-upgrades: false

  co-owner-gui:
    enabled: true
    use-chat-input: true

hunger:
  enabled: true
  task-interval-seconds: 60
  warning-threshold-percent: 25
  kill-on-zero: true

leveling:
  enabled: true
  max-level: 50
  base-xp: 100
  xp-scale: 1.15

bond:
  enabled: true
  max-bond: 100
  start-bond: 10
  start-level: 1

sounds:
  feed: "ENTITY_PLAYER_LEVELUP"
  levelup: "ENTITY_EXPERIENCE_ORB_PICKUP"
  death: "ENTITY_GENERIC_EXTINGUISH_FIRE"