# --------------------------------------------------------------------
# LekkerAnimal main configuration
# --------------------------------------------------------------------

debug: false

# Language file to use from the plugin folder
language-file: "lang_NL.yml"

# --------------------------------------------------------------------
# Database
# --------------------------------------------------------------------

database:
  # Supported: SQLITE, MYSQL
  type: "SQLITE"

  sqlite:
    file: "data.db"

  mysql:
    host: "localhost"
    port: 3306
    database: "lekkeranimal"
    username: "root"
    password: ""
    ssl: false
    pool-size: 10

# --------------------------------------------------------------------
# Main
# --------------------------------------------------------------------

main:
  autosave-interval-seconds: 300
  save-on-disable: true

# --------------------------------------------------------------------
# Modules
# --------------------------------------------------------------------

modules:
  online-owner-activity:
    enabled: true

  co-owners:
    enabled: true

    # Hard cap from config.
    # Actual player limit is still determined by permissions:
    # - no permission = 1 slot
    # - lekkeranimal.coowners.slots.2 = 2 slots
    # - lekkeranimal.coowners.slots.3 = 3 slots
    max-per-animal: 3

    allow-feed: true
    allow-harvest: true
    allow-gui-access: true
    allow-direct-upgrades: false

  co-owner-gui:
    enabled: true
    use-chat-input: true

# --------------------------------------------------------------------
# Hunger
# --------------------------------------------------------------------

hunger:
  enabled: true
  task-interval-seconds: 60
  warning-threshold-percent: 25
  kill-on-zero: true

# --------------------------------------------------------------------
# Leveling
# --------------------------------------------------------------------

leveling:
  enabled: true
  max-level: 50
  base-xp: 100
  xp-scale: 1.15

# --------------------------------------------------------------------
# Bond
# --------------------------------------------------------------------

bond:
  enabled: true
  max-bond: 100
  start-bond: 10
  start-level: 1

# --------------------------------------------------------------------
# Sounds
# --------------------------------------------------------------------

sounds:
  feed: "ENTITY_PLAYER_LEVELUP"
  levelup: "ENTITY_EXPERIENCE_ORB_PICKUP"
  death: "ENTITY_GENERIC_EXTINGUISH_FIRE"