gui:
  animal-info:
    enabled: true
    title: "&bAnimal Info &8• &f{animal}"
    rows: 3

    filler:
      enabled: true
      material: "LIGHT_BLUE_STAINED_GLASS_PANE"
      name: " "

    items:
      owner:
        slot: 10
        material: "PLAYER_HEAD"
        name: "&bEigenaar"
        lore:
          - "&7Eigenaar: &f{owner}"
          - "&7Type: &f{animal_type}"

      hunger:
        slot: 12
        material: "GOLDEN_CARROT"
        name: "&bHonger"
        lore:
          - "&7Honger: &b{hunger}&8/&f{max_hunger}"
          - "&7Status: {hunger_bar}"
          - ""
          - "&bKlik om te voederen"

      level:
        slot: 14
        material: "EXPERIENCE_BOTTLE"
        name: "&bLevel &f{level}"
        lore:
          - "&7XP: &f{xp}&8/&f{required_xp}"
          - "&7Progress: {xp_bar}"
          - ""
          - "&bVolgende upgrade:"
          - "&7Level: &f{next_level}"
          - "&7Item: &f{next_upgrade_item}"
          - "&7Hoeveel: &f{next_upgrade_amount}"
          - ""
          - "&bKlik om direct te upgraden"

      harvest:
        slot: 16
        material: "CHEST"
        name: "&bHarvest"
        lore:
          - "&7Status: {harvest_status}"
          - "&7Cooldown: &f{harvest_time_left}"
          - "&7Progress: &f{harvest_progress_percent}%"
          - ""
          - "&bMogelijke drops:"
          - "&f{harvest_preview}"
          - ""
          - "&bKlik om te harvesten"

      co-owners:
        slot: 22
        material: "NAME_TAG"
        name: "&bMede-eigenaars"
        lore:
          - "&7Aantal: &f{count}"
          - "&7Lijst: &f{list}"
          - ""
          - "&bKlik om te beheren"

  co-owner-menu:
    title: "&bMede-eigenaars"
    rows: 3

    filler:
      enabled: true
      material: "LIGHT_BLUE_STAINED_GLASS_PANE"
      name: " "

    items:
      co-owner-slots:
        - "11"
        - "13"
        - "15"

      empty-slot:
        material: "GRAY_DYE"
        name: "&7Leeg slot"
        lore:
          - "&7Hier is nog geen mede-eigenaar."

      co-owner-head:
        name: "&b{player}"
        lore:
          - "&7Klik om deze mede-eigenaar"
          - "&7te verwijderen."

      add:
        slot: 22
        material: "LIME_WOOL"
        name: "&aVoeg mede-eigenaar toe"
        lore:
          - "&7Huidig: &f{current}&8/&f{max}"
          - ""
          - "&aKlik en typ daarna"
          - "&aeen naam in de chat."

      toggle:
        slot: 24
        material: "REDSTONE"
        name: "&bMede-eigenaars activiteit: {status}"
        lore:
          - "&7Als dit aan staat,"
          - "&7blijft het dier actief (honger en harvesting)"
          - "&7wanneer een mede-eigenaar"
          - "&7online is."
          - ""
          - "&7Status: {status}"
          - ""
          - "&bKlik om te veranderen"
        status:
          enabled: "&aAAN"
          disabled: "&cUIT"

      back:
        slot: 26
        material: "BARRIER"
        name: "&cTerug"
        lore:
          - "&7Ga terug naar het dier menu."

  co-owner-remove-confirm:
    title: "&cVerwijder {player}?"
    rows: 3
    items:
      target:
        slot: 13
      yes:
        slot: 11
        material: "LIME_WOOL"
        name: "&aBevestigen"
        lore:
          - "&7Verwijder &f{player}"
          - "&7als mede-eigenaar."
      no:
        slot: 15
        material: "RED_WOOL"
        name: "&cAnnuleren"
        lore:
          - "&7Ga terug zonder iets"
          - "&7te verwijderen."

bars:
  hunger:
    length: 10
    full-color: "&a"
    empty-color: "&7"
    symbol: "■"

  xp:
    length: 10
    full-color: "&b"
    empty-color: "&7"
    symbol: "■"