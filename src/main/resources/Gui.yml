gui:
  animal-info:
    enabled: true
    title: "&bAnimal Info &8• &f{animal}"
    rows: 3

    filler:
      enabled: true
      material: "LIGHT_BLUE_STAINED_GLASS_PANE"
      name: " "

    items:
      owner:
        slot: 11
        material: "PLAYER_HEAD"
        name: "&bEigenaar"
        lore:
          - "&7Eigenaar: &f{owner}"
          - "&7Type: &f{animal_type}"

      hunger:
        slot: 13
        material: "GOLDEN_CARROT"
        name: "&bHonger"
        lore:
          - "&7Honger: &b{hunger}&8/&f{max_hunger}"
          - "&7Status: {hunger_bar}"
#         - "&7Percentage: &f{hunger_percent}%"
          - ""
          - "&bKlik om te voederen"

      level:
        slot: 15
        material: "EXPERIENCE_BOTTLE"
        name: "&bLevel &f{level}"
        lore:
          - "&7XP: &f{xp}&8/&f{required_xp}"
          - "&7Progress: {xp_bar}"
          - ""
          - "&bVolgende upgrade:"
          - "&7Level: &f{next_level}"
          - "&7Item: &f{next_upgrade_item}"
          - "&7Hoeveel: &f{next_upgrade_amount}"
          - ""
          - "&eKlik om direct te upgraden"

bars:
  hunger:
    length: 10
    full-color: "&a"
    empty-color: "&7"
    symbol: "■"

  xp:
    length: 10
    full-color: "&b"
    empty-color: "&7"
    symbol: "■"