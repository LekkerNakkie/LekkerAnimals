gui:
  animal-info:
    enabled: true
    title: "&bAnimal Info &8• &f{animal}"
    rows: 3

    filler:
      enabled: true
      material: "GRAY_STAINED_GLASS_PANE"
      name: " "

    items:
      owner:
        slot: 11
        material: "PLAYER_HEAD"
        name: "&bOwner"
        lore:
          - "&7Eigenaar: &f{owner}"
          - "&7Type: &f{animal_type}"

      hunger:
        slot: 13
        material: "GOLDEN_CARROT"
        name: "&cHunger"
        lore:
          - "&7Hunger: &f{hunger}&8/&f{max_hunger}"
          - "&7Status: {hunger_bar}"
          - "&7Percentage: &f{hunger_percent}%"

      level:
        slot: 15
        material: "EXPERIENCE_BOTTLE"
        name: "&eLevel"
        lore:
          - "&7Level: &f{level}"
          - "&7XP: &f{xp}&8/&f{required_xp}"
          - "&7Progress: {xp_bar}"
          - "&7Nog nodig: &f{xp_left}"

      next-upgrade:
        slot: 22
        material: "ANVIL"
        name: "&6Next Upgrade"
        lore:
          - "&7Volgend level: &f{next_level}"
          - "&7Item: &f{next_upgrade_item}"
          - "&7Amount: &f{next_upgrade_amount}"
          - "&7Status: {next_upgrade_status}"

bars:
  hunger:
    length: 10
    full-color: "&a"
    empty-color: "&7"
    symbol: "■"

  xp:
    length: 10
    full-color: "&b"
    empty-color: "&7"
    symbol: "■"